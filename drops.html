<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current Drop — Ossuary Atelier</title>
  <meta name="description" content="Current and archived pieces from Ossuary Atelier. Each item carries a QR-verified story.">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/target-cursor.css">
  <link rel="stylesheet" href="css/mobile.css" media="screen and (max-width: 768px)">
  <link rel="preload" href="js/nav.js" as="script">
  <link rel="preload" href="js/background.js" as="script">
  <style>
    /* ── DROPS HEADER ── */
    #drops-header {
      padding: calc(var(--nav-height) + 8vh) 6vw 6vh;
      border-bottom: 1px solid var(--violet-faint);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .drops-title {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      text-transform: uppercase;
      letter-spacing: -0.01em;
      color: var(--violet);
      line-height: 1;
    }

    .drops-count {
      font-family: var(--font-display);
      font-size: 3rem;
      letter-spacing: 0.4em;
      color: var(--bruise-mid);
      text-transform: uppercase;
    }

    .drops-date {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 1.05rem;
      color: var(--violet-dim);
    }

    /* Responsive Header */
    @media (max-width: 768px) {
      #drops-header {
        padding: calc(var(--nav-height) + 5vh) 5vw 4vh;
        gap: 1rem;
      }
      .drops-title { font-size: clamp(1.75rem, 12vw, 3rem); }
      .drops-count { font-size: 2rem; }
      .drops-date { font-size: 0.9rem; }
    }

    /* ── FILTER BAR ── */
    #filter-bar {
      padding: 1.5rem 6vw;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid var(--violet-faint);
      position: sticky;
      top: var(--nav-height);
      background: rgba(8,8,16,0.92);
      backdrop-filter: blur(16px);
      z-index: 10;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    #filter-bar::-webkit-scrollbar { display: none; }
    .filter-pill { flex-shrink: 0; }

    /* ── FILTER BAR ── */
    #filter-bar {
      padding: 1.5rem 6vw;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid var(--violet-faint);
      position: sticky;
      top: var(--nav-height);
      background: rgba(8,8,16,0.92);
      backdrop-filter: blur(16px);
      z-index: 10;
    }

    .filter-pill {
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--violet-dim);
      padding: 0.65rem 1.5rem;
      border: 1px solid var(--faint);
      background: transparent;
      cursor: pointer;
      transition: color 0.3s, border-color 0.3s, background 0.3s;
      position: relative;
    }

    .filter-pill.active,
    .filter-pill:hover {
      color: var(--violet);
      border-color: rgba(201,184,232,0.3);
      background: rgba(75,45,122,0.15);
    }

    .filter-pill[data-filter="relics"]::after {
      content: "Documented, verified and story-rich pieces";
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-display);
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--violet);
      background: rgba(28,24,40,0.95);
      border: 1px solid rgba(201,184,232,0.25);
      padding: 0.5rem 0.75rem;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .filter-pill[data-filter="relics"]:hover::after {
      opacity: 1;
    }

/* ── ITEM CARD RELIC STAR ── */
    .item-relic-star {
      position: absolute;
      top: 37px;
      right: 48px;
      font-size: 42px;
      color: #4B2D7A;
      z-index: 5;
      cursor: help;
      line-height: 1;
      -webkit-text-stroke: 2px #C9B8E8;
      transition: color 0.3s, transform 0.3s;
    }

    .item-relic-star::after {
      content: "Story-rich Relic Item";
      position: absolute;
      top: calc(100% + 10px);
      right: -10px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: #1C1828;
      border: 1px solid #4B2D7A;
      padding: 8px 14px;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.25s, visibility 0.25s;
      z-index: 99;
      color: #C9B8E8;
    }

    .item-relic-star:hover::after {
      opacity: 1;
      visibility: visible;
    }

    .item-card.relic:hover .item-relic-star {
      color: #fff;
      transform: scale(1.15);
    }

    /* ── DROPS GRID ── */
    #drops-grid {
      padding: 5vh 5vw;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    /* ── ITEM CARD ── */
    .item-card {
      break-inside: avoid;
      margin-bottom: 1.5rem;
      border: 1px solid var(--violet-faint);
      background: var(--midnight);
      position: relative;
      cursor: pointer;
      transition: border-color 0.4s, transform 0.4s var(--ease-out),
                  box-shadow 0.4s;
      overflow: hidden;
      opacity: 0;
      transform: translateY(30px);
      animation: card-in 0.6s var(--ease-out) forwards;
    }

    /* Relic card ornamental frame */
    .item-card.relic {
      border-color: rgba(201,184,232,0.35);
      box-shadow: 
        0 0 0 1px rgba(201,184,232,0.15),
        inset 0 0 30px rgba(75,45,122,0.08);
    }
    .item-card.relic::before {
      content: '';
      position: absolute;
      inset: 4px;
      background-image: url('assets/images/border_overlay.png');
      background-repeat: no-repeat;
      background-size: 100% 100%;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.3s ease;
      z-index: 3;
    }
    .item-card.relic:hover::before {
      opacity: 0;
    }

    .item-card:nth-child(2) { animation-delay: 0.07s; }
    .item-card:nth-child(3) { animation-delay: 0.14s; }
    .item-card:nth-child(4) { animation-delay: 0.21s; }
    .item-card:nth-child(5) { animation-delay: 0.28s; }

    @keyframes card-in {
      to { opacity: 1; transform: translateY(0); }
    }

    .item-card:hover {
      border-color: rgba(201,184,232,0.2);
      box-shadow: 0 8px 40px rgba(75,45,122,0.2);
    }

    /* Tilt alternation via nth-child */
    .item-card:nth-child(odd)  .item-photo-wrap  { transform: rotate(-0.8deg); }
    .item-card:nth-child(even) .item-photo-wrap  { transform: rotate(0.8deg); }
    .item-card:hover           .item-photo-wrap  { transform: rotate(0deg) scale(1.02); }

    /* ── PHOTO ── */
    .item-photo-wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      aspect-ratio: 3/4;
      overflow: hidden;
      transition: transform 0.5s var(--ease-out);
      background: var(--void);
    }

    .item-photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s var(--ease-out), filter 0.4s;
      filter: saturate(0.9);
    }

    .item-card:hover .item-photo-wrap img {
      transform: scale(1.04);
      filter: saturate(1);
    }

    /* Sold overlay */
    .item-card.sold .item-photo-wrap img {
      filter: saturate(0) brightness(0.6);
    }

    .sold-label {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 5;
    }

    .item-card.sold .sold-label {
      display: flex;
    }

    .sold-label-inner {
      font-family: var(--font-display);
      font-size: 0.65rem;
      letter-spacing: 0.6em;
      color: var(--violet-dim);
      border: 1px solid rgba(201,184,232,0.2);
      padding: 0.6rem 1.5rem;
      background: rgba(8,8,16,0.7);
      backdrop-filter: blur(4px);
    }

    /* ── CARD BODY ── */
    .item-body {
      position: relative;
      z-index: 4;
      padding: 1.25rem 1.25rem 1rem;
    }

    .item-id {
      font-family: var(--font-display);
      font-size: 0.5rem;
      letter-spacing: 0.4em;
      color: var(--bruise-mid);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      background: var(--midnight);
      -webkit-box-decoration-break: clone;
      box-decoration-break: clone;
    }

    .item-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: 0.1em;
      color: var(--violet);
      text-transform: uppercase;
      line-height: 1.3;
      margin-bottom: 0.3rem;
      background: var(--midnight);
      -webkit-box-decoration-break: clone;
      box-decoration-break: clone;
    }

    .item-era {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 1rem;
      color: var(--violet-dim);
      margin-bottom: 1rem;
      background: var(--midnight);
      -webkit-box-decoration-break: clone;
      box-decoration-break: clone;
    }

    .item-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.9rem;
      border-top: 1px solid var(--violet-faint);
    }

    .item-price {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.05em;
      color: var(--violet);
      background: var(--midnight);
      -webkit-box-decoration-break: clone;
      box-decoration-break: clone;
    }

    .item-eye-btn {
      position: relative;
      z-index: 2;
      width: 32px; height: 20px;
      opacity: 0.4;
      transition: opacity 0.3s, transform 0.3s var(--ease-out);
      flex-shrink: 0;
    }

    .item-card:hover .item-eye-btn {
      opacity: 1;
      transform: scaleX(1.15);
    }

    /* ── CLAIM MODAL ── */
    #claim-modal {
      position: fixed;
      inset: 0;
      z-index: 8000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s var(--ease-out);
    }

    #claim-modal.open {
      opacity: 1;
      pointer-events: all;
    }

    #claim-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(4,4,10,0.88);
      backdrop-filter: blur(12px);
    }

    #claim-modal-box {
      position: relative;
      z-index: 1;
      background: var(--midnight);
      border: 1px solid rgba(201,184,232,0.15);
      max-width: 720px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      transform: translateY(24px) scale(0.97);
      transition: transform 0.4s var(--ease-out);
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      max-height: 90vh;
      overflow-y: auto;
    }

    #claim-modal.open #claim-modal-box {
      transform: translateY(0) scale(1);
    }

    .modal-photo {
      aspect-ratio: 3/4;
      overflow: hidden;
      background: var(--void);
    }

    .modal-photo img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .modal-content {
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .modal-id {
      font-family: var(--font-display);
      font-size: 0.5rem;
      letter-spacing: 0.5em;
      color: var(--bruise-mid);
      text-transform: uppercase;
    }

    .modal-name {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.3rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--violet);
      line-height: 1.2;
    }

    .modal-desc {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 0.95rem;
      color: var(--violet-dim);
      line-height: 1.7;
    }

    .modal-measurements {
      font-family: var(--font-display);
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--violet-dim);
      text-transform: uppercase;
      line-height: 2;
    }

    .modal-price {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--violet);
      margin-top: auto;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .modal-close {
      position: absolute;
      top: 1rem; right: 1rem;
      font-family: var(--font-display);
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--violet-dim);
      text-transform: uppercase;
      transition: color 0.3s;
      padding: 0.5rem;
      cursor: pointer;
    }
    .modal-close:hover { color: var(--violet); }

    /* ── INTERACTIVE BACKGROUND ── */
    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    /* ── FOOTER ── */
    #footer {
      border-top: 1px solid var(--violet-faint);
      padding: 2.5rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4rem;
    }
    .footer-copy {
      font-family: var(--font-display); font-size: 0.68rem;
      letter-spacing: 0.35em; color: var(--bruise-mid); text-transform: uppercase;
    }
    .footer-ig {
      display: flex; align-items: center; gap: 0.6rem;
      font-family: var(--font-display); font-size: 0.68rem;
      letter-spacing: 0.3em; color: var(--violet-dim); text-transform: uppercase;
      transition: color 0.3s;
    }
    .footer-ig:hover { color: var(--violet); }

    @media (max-width: 768px) {
      #drops-grid { grid-template-columns: repeat(2, 1fr); }
      .item-name { font-size: 1.5rem; }
      .drops-count { font-size: 2rem; }
      /* Disable tilt on mobile - hover doesn't exist */
      .item-card:nth-child(odd)  .item-photo-wrap,
      .item-card:nth-child(even) .item-photo-wrap { transform: none; }
    }
    @media (max-width: 600px) {
      #drops-grid { grid-template-columns: 1fr; gap: 1rem; }
      .item-name { font-size: 1.35rem; }
      .item-body { padding: 0.9rem 1rem 0.75rem; }
      .item-price { font-size: 0.9rem; }
      /* Modal */
      #claim-modal { padding: 1rem; }
      #claim-modal-box { grid-template-columns: 1fr; max-width: 100%; }
      .modal-photo { aspect-ratio: 4/3; }
      .modal-content { padding: 1.5rem 1.25rem; }
      .modal-name { font-size: 1.1rem; }
      .modal-price { font-size: 1.2rem; }
      /* Filter Bar */
      #filter-bar { padding: 1rem 5vw; gap: 0.5rem; }
      .filter-pill { font-size: 0.65rem; padding: 0.5rem 1rem; }
      /* Mobile touch fixes */
      .item-card:active { transform: scale(0.985); }
      .item-relic-star { opacity: 0.8; }
      /* Keep relic overlay visible on tap (hover triggers on touch) */
      .item-card.relic:hover::before { opacity: 1; }
    }
    
  </style>
</head>

  <!-- ── HEADER ── -->
  <header id="drops-header">
    <h1 class="drops-title">Current<br>Drop</h1>

      <span class="drops-count" id="available-count">— pieces available</span>

  <!-- ── FILTER BAR ── -->
  <div id="filter-bar" role="group" aria-label="Filter items">
    <button class="filter-pill active" data-filter="all">All</button>
    <button class="filter-pill" data-filter="available">Available</button>

  <!-- ── GRID ── -->
  <main id="drops-grid" aria-label="Item grid">

  </main>

  <!-- ── CLAIM MODAL ── -->
  <div id="claim-modal" role="dialog" aria-modal="true" aria-labelledby="modal-name-el">
    <div id="claim-modal-backdrop"></div>
    <div id="claim-modal-box">
      <button class="modal-close" id="modal-close-btn">✕ Close</button>
      <div class="modal-photo">
        <img id="modal-img" src="" alt="" loading="lazy">
      </div>
      <div class="modal-content">
        <span class="modal-id"  id="modal-id-el"></span>
        <h2  class="modal-name" id="modal-name-el"></h2>
        <p   class="modal-desc" id="modal-desc-el"></p>
        <div class="modal-measurements" id="modal-meas-el"></div>
        <div class="modal-price" id="modal-price-el"></div>
        <div class="modal-actions">
          <a id="modal-dm-btn" href="https://www.instagram.com/ossuary.atelier/" target="_blank" rel="noopener" class="btn-seal">
            DM to Claim →
          </a>
          <a id="modal-story-btn" href="#" target="_blank"
             class="btn-seal" style="opacity:0.6; font-size:0.58rem;">
            Read the Story
          </a>
        </div>
      </div>
    </div>
  </div>

  <footer id="footer">
    <span class="footer-copy">Ossuary Atelier © 2026</span>
    <div class="footer-links">
      <a href="tos.html">TOS</a>
    </div>
    <a href="https://www.instagram.com/ossuary.atelier/" target="_blank" rel="noopener" class="footer-ig">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
      </svg>
      @ossuaryatelier
    </a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="js/nav.js"></script>

      {
        id: 'ITEM-003',
        name: 'Gusendi Denim',
        era: 'Mid 1990s · Japan · Dark-Medium Wash',
        desc: 'Classic five-pocket jeans with a clean wash. Minimal fading, original buttons intact.',
        size: 'W34 / L32',
        price: '฿550',
        status: 'available',
        storyUrl: '',
        photo: 'assets/images/ITEM-003.png'
      },
      {
        id: 'ITEM-004',
        name: 'Neon Lime Text Shirt',
        era: 'Late 1980s · USA · Self-Referential Print',
        desc: 'Bright neon lime oversized shirt with ironic self-referential text across the back. Bold statement piece.',
        size: 'XL / Chest 60cm / Length 76cm',
        price: '฿450',
        status: 'available',
        storyUrl: '',
        photo: 'assets/images/ITEM-004.png'
      },
    ];

    let currentFilter = 'all';

    // ── EYE SVG for cards ──
    function eyeSVGSmall() {
      return `<svg viewBox="-90 -58 180 116" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
        <path d="M -72 0 C -52 -48, 52 -48, 72 0 C 52 48, -52 48, -72 0 Z" fill="#C9B8E8"/>
        <ellipse cx="0" cy="0" rx="46" ry="36" fill="#1C1828"/>
        <circle cx="0" cy="0" r="36" fill="none" stroke="#C9B8E8" stroke-width="2.2"/>
        <circle cx="0" cy="0" r="18" fill="#C9B8E8"/>
        <circle cx="0" cy="0" r="10" fill="#1C1828"/>
        <circle cx="0" cy="0" r="5.5" fill="none" stroke="#C9B8E8" stroke-width="1.6"/>
        <line x1="-72" y1="0" x2="-86" y2="0" stroke="#C9B8E8" stroke-width="2.8" stroke-linecap="round"/>
        <line x1="-86" y1="-7" x2="-86" y2="7" stroke="#C9B8E8" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="72"  y1="0" x2="86"  y2="0" stroke="#C9B8E8" stroke-width="2.8" stroke-linecap="round"/>
        <line x1="86"  y1="-7" x2="86"  y2="7" stroke="#C9B8E8" stroke-width="1.8" stroke-linecap="round"/>
      </svg>`;
    }

    // ── RENDER GRID ──
    function renderGrid(filter) {
      const grid = document.getElementById('drops-grid');
      grid.innerHTML = '';
      const filtered = filter === 'all' ? ITEMS :
                       filter === 'relics' ? ITEMS.filter(i => !!i.storyUrl) :
                       filter === 'sold' ? ITEMS.filter(i => i.status === 'sold') :
                       ITEMS.filter(i => i.status === 'available');

      if (filtered.length === 0) {
        grid.innerHTML = '<p class="no-items">No items in this category yet.</p>';
        return;
      }

      filtered.forEach((item, idx) => {
        const card = document.createElement('article');
        const isRelic = !!item.storyUrl;
        card.className = `item-card ${item.status === 'sold' ? 'sold' : ''}${isRelic ? ' relic' : ''}`;
        card.style.animationDelay = `${idx * 0.07}s`;
        card.setAttribute('data-id', item.id);
        card.innerHTML = `
          ${isRelic ? `
            <div class="item-relic-star">★</div>
          ` : ''}
          <div class="item-photo-wrap">
            <img src="${item.photo}" alt="${item.name}"
                 loading="lazy"
                 onerror="this.parentElement.style.background='#1C1828';this.style.display='none'">
            <div class="sold-label">
              <span class="sold-label-inner">CLAIMED</span>
            </div>
          </div>
          <div class="item-body">
            <div class="item-id">${item.id}</div>
            <div class="item-name">${item.name}</div>
            <div class="item-era">${item.era}</div>
            <div class="item-footer">
              <span class="item-price">${item.status === 'sold' ? '—' : item.price}</span>
              <div class="item-eye-btn" aria-hidden="true">${eyeSVGSmall()}</div>
            </div>
          </div>`;

        if (item.status !== 'sold') {
          card.addEventListener('click', () => openModal(item));
        }
        grid.appendChild(card);
      });

      // update count
      const available = ITEMS.filter(i => i.status === 'available').length;
      document.getElementById('available-count').textContent =
        `${available} piece${available !== 1 ? 's' : ''} available`;
    }

    // ── FILTER PILLS ──
    document.querySelectorAll('.filter-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        currentFilter = pill.dataset.filter;
        renderGrid(currentFilter);
      });
    });

    // ── MODAL ──
    function openModal(item) {
      document.getElementById('modal-img').src    = item.photo;
      document.getElementById('modal-img').alt    = item.name;
      document.getElementById('modal-id-el').textContent   = item.id + ' · ' + item.era;
      document.getElementById('modal-name-el').textContent = item.name;
      document.getElementById('modal-desc-el').textContent = item.desc;
      document.getElementById('modal-meas-el').textContent = item.size;
      document.getElementById('modal-price-el').textContent = item.price;
      document.getElementById('modal-story-btn').href = item.storyUrl || '#';
      document.getElementById('modal-story-btn').style.display = item.storyUrl ? 'flex' : 'none';
      document.getElementById('claim-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('claim-modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('modal-close-btn').addEventListener('click', closeModal);
    document.getElementById('claim-modal-backdrop').addEventListener('click', closeModal);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── INIT ──
    renderGrid('all');
  });
  </script>
</body>
</html>
