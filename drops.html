<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current Drop — Ossuary Atelier</title>
  <meta name="description" content="Current and archived pieces from Ossuary Atelier. Each item carries a QR-verified story.">
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="nav.css">
  <style>

    /* ── DROPS HEADER ── */
    #drops-header {
      padding: calc(var(--nav-height) + 8vh) 6vw 6vh;
      border-bottom: 1px solid var(--violet-faint);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .drops-title {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      text-transform: uppercase;
      letter-spacing: -0.01em;
      color: var(--violet);
      line-height: 1;
    }

    .drops-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5rem;
    }

    .drops-count {
      font-family: var(--font-display);
      font-size: 0.6rem;
      letter-spacing: 0.4em;
      color: var(--bruise-mid);
      text-transform: uppercase;
    }

    .drops-date {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 0.95rem;
      color: var(--violet-dim);
    }

    /* ── FILTER BAR ── */
    #filter-bar {
      padding: 1.5rem 6vw;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid var(--violet-faint);
      position: sticky;
      top: var(--nav-height);
      background: rgba(8,8,16,0.92);
      backdrop-filter: blur(16px);
      z-index: 10;
    }

    .filter-pill {
      font-family: var(--font-display);
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--violet-dim);
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--faint);
      background: transparent;
      cursor: none;
      transition: color 0.3s, border-color 0.3s, background 0.3s;
    }

    .filter-pill.active,
    .filter-pill:hover {
      color: var(--violet);
      border-color: rgba(201,184,232,0.3);
      background: rgba(75,45,122,0.15);
    }

    /* ── DROPS GRID ── */
    #drops-grid {
      padding: 5vh 5vw;
      columns: 3 280px;
      column-gap: 1.5rem;
    }

    /* ── ITEM CARD ── */
    .item-card {
      break-inside: avoid;
      margin-bottom: 1.5rem;
      border: 1px solid var(--violet-faint);
      background: var(--midnight);
      position: relative;
      cursor: none;
      transition: border-color 0.4s, transform 0.4s var(--ease-out),
                  box-shadow 0.4s;
      overflow: hidden;
      opacity: 0;
      transform: translateY(30px);
      animation: card-in 0.6s var(--ease-out) forwards;
    }

    .item-card:nth-child(2) { animation-delay: 0.07s; }
    .item-card:nth-child(3) { animation-delay: 0.14s; }
    .item-card:nth-child(4) { animation-delay: 0.21s; }
    .item-card:nth-child(5) { animation-delay: 0.28s; }

    @keyframes card-in {
      to { opacity: 1; transform: translateY(0); }
    }

    .item-card:hover {
      border-color: rgba(201,184,232,0.2);
      box-shadow: 0 8px 40px rgba(75,45,122,0.2);
    }

    /* Tilt alternation via nth-child */
    .item-card:nth-child(odd)  .item-photo-wrap  { transform: rotate(-0.8deg); }
    .item-card:nth-child(even) .item-photo-wrap  { transform: rotate(0.8deg); }
    .item-card:hover           .item-photo-wrap  { transform: rotate(0deg) scale(1.02); }

    /* ── PHOTO ── */
    .item-photo-wrap {
      width: 100%;
      aspect-ratio: 3/4;
      overflow: hidden;
      transition: transform 0.5s var(--ease-out);
      background: var(--void);
      position: relative;
    }

    .item-photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s var(--ease-out), filter 0.4s;
      filter: saturate(0.9);
    }

    .item-card:hover .item-photo-wrap img {
      transform: scale(1.04);
      filter: saturate(1);
    }

    /* Sold overlay */
    .item-card.sold .item-photo-wrap img {
      filter: saturate(0) brightness(0.6);
    }

    .sold-label {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .item-card.sold .sold-label {
      display: flex;
    }

    .sold-label-inner {
      font-family: var(--font-display);
      font-size: 0.65rem;
      letter-spacing: 0.6em;
      color: var(--violet-dim);
      border: 1px solid rgba(201,184,232,0.2);
      padding: 0.6rem 1.5rem;
      background: rgba(8,8,16,0.7);
      backdrop-filter: blur(4px);
    }

    /* ── CARD BODY ── */
    .item-body {
      padding: 1.25rem 1.25rem 1rem;
    }

    .item-id {
      font-family: var(--font-display);
      font-size: 0.5rem;
      letter-spacing: 0.4em;
      color: var(--bruise-mid);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .item-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      color: var(--violet);
      text-transform: uppercase;
      line-height: 1.3;
      margin-bottom: 0.3rem;
    }

    .item-era {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 0.85rem;
      color: var(--violet-dim);
      margin-bottom: 1rem;
    }

    .item-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.9rem;
      border-top: 1px solid var(--violet-faint);
    }

    .item-price {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.05em;
      color: var(--violet);
    }

    .item-eye-btn {
      width: 32px; height: 20px;
      opacity: 0.4;
      transition: opacity 0.3s, transform 0.3s var(--ease-out);
      flex-shrink: 0;
    }

    .item-card:hover .item-eye-btn {
      opacity: 1;
      transform: scaleX(1.15);
    }

    /* ── CLAIM MODAL ── */
    #claim-modal {
      position: fixed;
      inset: 0;
      z-index: 8000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s var(--ease-out);
    }

    #claim-modal.open {
      opacity: 1;
      pointer-events: all;
    }

    #claim-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(4,4,10,0.88);
      backdrop-filter: blur(12px);
    }

    #claim-modal-box {
      position: relative;
      z-index: 1;
      background: var(--midnight);
      border: 1px solid rgba(201,184,232,0.15);
      max-width: 720px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      transform: translateY(24px) scale(0.97);
      transition: transform 0.4s var(--ease-out);
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      max-height: 90vh;
      overflow-y: auto;
    }

    #claim-modal.open #claim-modal-box {
      transform: translateY(0) scale(1);
    }

    .modal-photo {
      aspect-ratio: 3/4;
      overflow: hidden;
      background: var(--void);
    }

    .modal-photo img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .modal-content {
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .modal-id {
      font-family: var(--font-display);
      font-size: 0.5rem;
      letter-spacing: 0.5em;
      color: var(--bruise-mid);
      text-transform: uppercase;
    }

    .modal-name {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.3rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--violet);
      line-height: 1.2;
    }

    .modal-desc {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 0.95rem;
      color: var(--violet-dim);
      line-height: 1.7;
    }

    .modal-measurements {
      font-family: var(--font-display);
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--violet-dim);
      text-transform: uppercase;
      line-height: 2;
    }

    .modal-price {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--violet);
      margin-top: auto;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .modal-close {
      position: absolute;
      top: 1rem; right: 1rem;
      font-family: var(--font-display);
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--violet-dim);
      text-transform: uppercase;
      transition: color 0.3s;
      padding: 0.5rem;
    }
    .modal-close:hover { color: var(--violet); }

    /* ── EMPTY STATE ── */
    .no-items {
      grid-column: 1/-1;
      text-align: center;
      padding: 8rem 2rem;
      font-family: var(--font-body);
      font-style: italic;
      font-size: 1.1rem;
      color: var(--violet-dim);
    }

    /* ── FOOTER ── */
    #footer {
      border-top: 1px solid var(--violet-faint);
      padding: 2.5rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4rem;
    }
    .footer-copy {
      font-family: var(--font-display); font-size: 0.58rem;
      letter-spacing: 0.35em; color: var(--bruise-mid); text-transform: uppercase;
    }
    .footer-ig {
      display: flex; align-items: center; gap: 0.6rem;
      font-family: var(--font-display); font-size: 0.58rem;
      letter-spacing: 0.3em; color: var(--violet-dim); text-transform: uppercase;
      transition: color 0.3s;
    }
    .footer-ig:hover { color: var(--violet); }

    @media (max-width: 600px) {
      #claim-modal-box { grid-template-columns: 1fr; }
      .modal-photo { aspect-ratio: 4/3; }
    }
  </style>
</head>
<body>

  <!-- ── INTERACTIVE BACKGROUND ── -->
  <canvas id="background-canvas"></canvas>

  <div id="page-transition"></div>
  <div id="cursor"></div>
  <div id="cursor-trail"></div>

  <nav id="nav">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-eye"></div>
      <div class="nav-logo-text">OSSUARY<span>ATELIER</span></div>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="drops.html">Drops</a></li>
      <li><a href="story.html">The Story</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="nav-burger"><span></span><span></span><span></span></button>
  </nav>
  <div id="nav-overlay">
    <a href="index.html">Home</a><a href="about.html">About</a>
    <a href="drops.html">Drops</a><a href="story.html">The Story</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- ── HEADER ── -->
  <header id="drops-header">
    <h1 class="drops-title">Current<br>Drop</h1>
    <div class="drops-meta">
      <span class="drops-count" id="available-count">— pieces available</span>
      <span class="drops-date">Drop 001 · March 2026</span>
    </div>
  </header>

  <!-- ── FILTER BAR ── -->
  <div id="filter-bar" role="group" aria-label="Filter items">
    <button class="filter-pill active" data-filter="all">All</button>
    <button class="filter-pill" data-filter="available">Available</button>
    <button class="filter-pill" data-filter="sold">Claimed</button>
  </div>

  <!-- ── GRID ── -->
  <main id="drops-grid" aria-label="Item grid">
    <!-- Cards injected by JS -->
  </main>

  <!-- ── CLAIM MODAL ── -->
  <div id="claim-modal" role="dialog" aria-modal="true" aria-labelledby="modal-name-el">
    <div id="claim-modal-backdrop"></div>
    <div id="claim-modal-box">
      <button class="modal-close" id="modal-close-btn">✕ Close</button>
      <div class="modal-photo">
        <img id="modal-img" src="" alt="">
      </div>
      <div class="modal-content">
        <span class="modal-id"  id="modal-id-el"></span>
        <h2  class="modal-name" id="modal-name-el"></h2>
        <p   class="modal-desc" id="modal-desc-el"></p>
        <div class="modal-measurements" id="modal-meas-el"></div>
        <div class="modal-price" id="modal-price-el"></div>
        <div class="modal-actions">
          <a id="modal-dm-btn" href="contact.html" class="btn-seal">
            DM to Claim →
          </a>
          <a id="modal-story-btn" href="#" target="_blank"
             class="btn-seal" style="opacity:0.6; font-size:0.58rem;">
            Read the Story
          </a>
        </div>
      </div>
    </div>
  </div>

  <footer id="footer">
    <span class="footer-copy">Ossuary Atelier © 2026</span>
    <a href="https://instagram.com/ossuaryatelier" target="_blank" rel="noopener" class="footer-ig">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
      </svg>
      @ossuaryatelier
    </a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="nav.js"></script>
  <script src="background.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {

    // ── ITEMS DATA — replace with your real items ──
    const ITEMS = [
      {
        id: 'ITEM-001',
        name: 'Italian Wool Blazer',
        era: 'Early 1990s · Made in Italy',
        desc: 'Found between a rack of fleece hoodies at Salvation Army, Silom. The label reads Made in Italy — the wool still stiff, barely worn. Herringbone weave catches the light in a way that made it impossible to put back.',
        size: 'M / Chest 48cm / Length 72cm',
        price: '฿850',
        status: 'available',
        storyUrl: 'https://sites.google.com/view/ossuaryatelier/item-001',
        photo: 'assets/images/item-001.jpg'
      },
      {
        id: 'ITEM-002',
        name: '90s Silk Abstract Shirt',
        era: 'Mid 1990s · Made in Thailand',
        desc: 'Chatuchak Market, early morning. The abstract print — muted terracotta and slate — reads almost like a painting. Original collar stays still threaded. Silk this weight doesn\'t get made this way anymore.',
        size: 'M / Chest 52cm / Length 68cm',
        price: '฿480',
        status: 'available',
        storyUrl: 'https://sites.google.com/view/ossuaryatelier/item-002',
        photo: 'assets/images/item-002.jpg'
      },
      {
        id: 'ITEM-003',
        name: 'Levi\'s 501 Faded Denim',
        era: 'Late 1980s · Made in USA',
        desc: 'Orange tab, single-stitch, paper patch still legible. The fade is natural — decades of wear, not a wash treatment. These were made before denim became costume.',
        size: 'W32 L30',
        price: '฿750',
        status: 'sold',
        storyUrl: 'https://sites.google.com/view/ossuaryatelier/item-003',
        photo: 'assets/images/item-003.jpg'
      },
      {
        id: 'ITEM-004',
        name: 'Wool Overcoat, Navy',
        era: 'Late 1980s · Made in England',
        desc: 'A Salvation Army find — the kind of overcoat that belongs in a film. Double-breasted, fully lined, original buttons. The tailor\'s alteration at the hem is still hand-stitched.',
        size: 'L / Chest 54cm / Length 104cm',
        price: '฿1,100',
        status: 'available',
        storyUrl: 'https://sites.google.com/view/ossuaryatelier/item-004',
        photo: 'assets/images/item-004.jpg'
      },
      {
        id: 'ITEM-005',
        name: 'Bouclé Jacket, Cream',
        era: 'Early 1990s · Made in Hong Kong',
        desc: 'The texture of this bouclé is unlike modern production — dense, uneven, intentional. Gold tone hardware. Found folded under three other jackets; someone had hidden it.',
        size: 'S-M / Chest 44cm / Length 58cm',
        price: '฿620',
        status: 'available',
        storyUrl: 'https://sites.google.com/view/ossuaryatelier/item-005',
        photo: 'assets/images/item-005.jpg'
      },
    ];

    let currentFilter = 'all';

    // ── EYE SVG for cards ──
    function eyeSVGSmall() {
      return `<svg viewBox="-90 -58 180 116" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
        <path d="M -72 0 C -52 -48, 52 -48, 72 0 C 52 48, -52 48, -72 0 Z" fill="#C9B8E8"/>
        <ellipse cx="0" cy="0" rx="46" ry="36" fill="#1C1828"/>
        <circle cx="0" cy="0" r="36" fill="none" stroke="#C9B8E8" stroke-width="2.2"/>
        <circle cx="0" cy="0" r="18" fill="#C9B8E8"/>
        <circle cx="0" cy="0" r="10" fill="#1C1828"/>
        <circle cx="0" cy="0" r="5.5" fill="none" stroke="#C9B8E8" stroke-width="1.6"/>
        <line x1="-72" y1="0" x2="-86" y2="0" stroke="#C9B8E8" stroke-width="2.8" stroke-linecap="round"/>
        <line x1="-86" y1="-7" x2="-86" y2="7" stroke="#C9B8E8" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="72"  y1="0" x2="86"  y2="0" stroke="#C9B8E8" stroke-width="2.8" stroke-linecap="round"/>
        <line x1="86"  y1="-7" x2="86"  y2="7" stroke="#C9B8E8" stroke-width="1.8" stroke-linecap="round"/>
      </svg>`;
    }

    // ── RENDER GRID ──
    function renderGrid(filter) {
      const grid = document.getElementById('drops-grid');
      grid.innerHTML = '';
      const filtered = filter === 'all' ? ITEMS :
                       ITEMS.filter(i => filter === 'sold' ? i.status === 'sold' : i.status === 'available');

      if (filtered.length === 0) {
        grid.innerHTML = '<p class="no-items">No items in this category yet.</p>';
        return;
      }

      filtered.forEach((item, idx) => {
        const card = document.createElement('article');
        card.className = `item-card ${item.status === 'sold' ? 'sold' : ''}`;
        card.style.animationDelay = `${idx * 0.07}s`;
        card.setAttribute('data-id', item.id);
        card.innerHTML = `
          <div class="item-photo-wrap">
            <img src="${item.photo}" alt="${item.name}"
                 onerror="this.parentElement.style.background='#1C1828';this.style.display='none'">
            <div class="sold-label">
              <span class="sold-label-inner">CLAIMED</span>
            </div>
          </div>
          <div class="item-body">
            <div class="item-id">${item.id}</div>
            <div class="item-name">${item.name}</div>
            <div class="item-era">${item.era}</div>
            <div class="item-footer">
              <span class="item-price">${item.status === 'sold' ? '—' : item.price}</span>
              <div class="item-eye-btn" aria-hidden="true">${eyeSVGSmall()}</div>
            </div>
          </div>`;

        if (item.status !== 'sold') {
          card.addEventListener('click', () => openModal(item));
        }
        grid.appendChild(card);
      });

      // update count
      const available = ITEMS.filter(i => i.status === 'available').length;
      document.getElementById('available-count').textContent =
        `${available} piece${available !== 1 ? 's' : ''} available`;
    }

    // ── FILTER PILLS ──
    document.querySelectorAll('.filter-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        currentFilter = pill.dataset.filter;
        renderGrid(currentFilter);
      });
    });

    // ── MODAL ──
    function openModal(item) {
      document.getElementById('modal-img').src    = item.photo;
      document.getElementById('modal-img').alt    = item.name;
      document.getElementById('modal-id-el').textContent   = item.id + ' · ' + item.era;
      document.getElementById('modal-name-el').textContent = item.name;
      document.getElementById('modal-desc-el').textContent = item.desc;
      document.getElementById('modal-meas-el').textContent = item.size;
      document.getElementById('modal-price-el').textContent = item.price;
      document.getElementById('modal-story-btn').href = item.storyUrl;
      document.getElementById('claim-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('claim-modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('modal-close-btn').addEventListener('click', closeModal);
    document.getElementById('claim-modal-backdrop').addEventListener('click', closeModal);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── INIT ──
    renderGrid('all');
  });
  </script>
</body>
</html>
